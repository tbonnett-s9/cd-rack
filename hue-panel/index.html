<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lights</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; background: #0c0b0f; color: #f2efe9;
  font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  -webkit-user-select: none; user-select: none;
}
body { background: -webkit-radial-gradient(50% 0%, 120% 90%, #201d27, #0b0a0e 70%); }
.screen { padding: 4vw; }

/* Header */
.head {
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between; margin-bottom: 3vw;
}
.head h1 { font-size: 6vw; font-weight: 700; letter-spacing: .5px; }
.allbtns { display: -webkit-flex; display: flex; }
.allbtns button {
  border: 0; border-radius: 999px; padding: 2.4vw 4vw; margin-left: 2vw;
  font-size: 3.6vw; font-weight: 600; cursor: pointer; color: #f2efe9;
  background: rgba(255,255,255,.1);
}
.allbtns button:active { -webkit-transform: scale(.95); transform: scale(.95); }
.allbtns .on { background: #f4b73d; color: #241500; }

/* Room cards */
.grid {
  display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap;
  -webkit-align-items: flex-start; align-items: flex-start;   /* don't stretch cards to row height */
}
.card {
  width: 46%; margin: 2%; padding: 4vw; border-radius: 18px;
  background: -webkit-linear-gradient(top, #232029, #17151c);
  box-shadow: 0 8px 22px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
}
.card.on { background: -webkit-linear-gradient(top, #4a3a12, #2a2109); }
.card .row {
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between;
}
.card .titles { min-width: 0; }
.card .name { font-size: 4.4vw; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card .sub { font-size: 3vw; color: #a49d92; margin-top: .4vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toggle {
  width: 15vw; height: 8.6vw; border-radius: 999px; background: rgba(255,255,255,.16);
  position: relative; -webkit-transition: background .15s; transition: background .15s; flex: 0 0 auto;
}
.toggle:after {
  content: ""; position: absolute; top: .8vw; left: .8vw; width: 7vw; height: 7vw;
  border-radius: 50%; background: #fff;
  -webkit-transition: left .15s; transition: left .15s;
}
.card.on .toggle, .toggle.on { background: #f4b73d; }
.card.on .toggle:after, .toggle.on:after { left: 7.8vw; }
.card input[type=range] {
  width: 100%; margin-top: 4vw; -webkit-appearance: none; height: 6vw;
  background: transparent;
}
.card input[type=range]::-webkit-slider-runnable-track {
  height: 2.4vw; border-radius: 999px; background: rgba(255,255,255,.18);
}
.card input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 7vw; height: 7vw; border-radius: 50%;
  background: #fff; margin-top: -2.3vw; box-shadow: 0 2px 5px rgba(0,0,0,.4);
}
.card.off input[type=range]::-webkit-slider-thumb { background: #8a857c; }

/* Colours & scenes */
.expand {
  margin-top: 3.5vw; width: 100%; background: rgba(255,255,255,.08); color: #d8d2c8;
  border: 0; border-radius: 999px; padding: 2.8vw; font-size: 3.4vw; font-weight: 600; cursor: pointer;
}
.more { display: none; margin-top: 3.5vw; }
.more.open { display: block; }
.sectlabel { font-size: 2.8vw; color: #8a8378; text-align: left; margin: 2vw 0 1.6vw;
  letter-spacing: 1px; text-transform: uppercase; }
.swatches { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
.swatch {
  position: relative; width: 10vw; height: 10vw; border-radius: 50%; margin: 1.4vw;
  border: 2px solid rgba(255,255,255,.22); cursor: pointer;
}
.swatch:active { -webkit-transform: scale(.9); transform: scale(.9); }
.swatch.sel { border-color: #fff; box-shadow: 0 0 0 3px #fff; }
.swatch.sel:after {
  content: "\2713"; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  line-height: 10vw; text-align: center; color: #fff; font-size: 4.6vw; font-weight: 700;
  text-shadow: 0 1px 2px rgba(0,0,0,.7);
}
.scenes { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
.scene-tile {
  position: relative; width: 46%; margin: 2%; height: 22vw; border-radius: 14px; overflow: hidden;
  background: #2a2a30; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.4);
}
.scene-tile .nm {
  position: absolute; left: 0; right: 0; bottom: 0; padding: 2.6vw; font-size: 3.3vw; font-weight: 600;
  color: #fff; text-align: left; text-shadow: 0 1px 3px rgba(0,0,0,.9);
  background: -webkit-linear-gradient(top, rgba(0,0,0,0), rgba(0,0,0,.6));
}
.scene-tile.sel { box-shadow: 0 0 0 3px #fff, 0 3px 10px rgba(0,0,0,.4); }
.scene-tile .chk {
  position: absolute; top: 1.8vw; right: 1.8vw; width: 6.4vw; height: 6.4vw; border-radius: 50%;
  background: #fff; color: #111; text-align: center; line-height: 6.4vw; font-size: 3.8vw; font-weight: 700;
  display: none;
}
.scene-tile.sel .chk { display: block; }

/* Detail button on card */
.more-btn {
  margin-top: 3.5vw; width: 100%;
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between;
  background: rgba(255,255,255,.08); color: #d8d2c8; border: 0; border-radius: 12px;
  padding: 3vw 4vw; font-size: 3.4vw; font-weight: 600; cursor: pointer;
}
.more-btn .chev { color: #8a8378; font-size: 5vw; }

/* Room detail popup */
.modal {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
}
.modal-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.62);
  -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); }
.sheet {
  position: relative; z-index: 1; width: 92%; max-width: 900px; max-height: 88%;
  background: -webkit-linear-gradient(top, #242028, #151319);
  border-radius: 22px; box-shadow: 0 30px 80px rgba(0,0,0,.7); overflow: hidden;
  display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column;
}
.sheet-head {
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between; padding: 5vw 5vw 3vw;
}
.sheet-title { font-size: 5.4vw; font-weight: 700; }
.sheet-close { width: 11vw; height: 11vw; border-radius: 50%; border: 0;
  background: rgba(255,255,255,.12); color: #fff; font-size: 6vw; line-height: 1; cursor: pointer; }
.sheet-close:active { -webkit-transform: scale(.92); transform: scale(.92); }
.sheet-body { padding: 0 5vw 6vw; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.m-slider { width: 100%; -webkit-appearance: none; height: 9vw; background: transparent; margin-bottom: 2vw; }
.m-slider::-webkit-slider-runnable-track { height: 2.8vw; border-radius: 999px; background: rgba(255,255,255,.2); }
.m-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 8.5vw; height: 8.5vw; border-radius: 50%;
  background: #fff; margin-top: -2.9vw; box-shadow: 0 2px 6px rgba(0,0,0,.5); }
.sheet .swatch { width: 12vw; height: 12vw; }
.sheet .swatch.sel:after { line-height: 12vw; font-size: 5.6vw; }
.sheet .scene-tile { width: 47%; height: 30vw; margin: 1.5%; }

/* Colour wheel */
.wheel-wrap { position: relative; width: 220px; height: 220px; margin: 1vw auto 4vw; }
.wheel { width: 220px; height: 220px; border-radius: 50%; display: block; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
.wheel-marker {
  position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 3px solid #fff;
  box-shadow: 0 0 0 1px rgba(0,0,0,.45), 0 2px 5px rgba(0,0,0,.6); pointer-events: none;
  -webkit-box-sizing: border-box; box-sizing: border-box;
}

/* Per-light rows */
.lights { margin-top: 1vw; }
.light-row { padding: 3.5vw 0; border-top: 1px solid rgba(255,255,255,.07); }
.light-row:first-child { border-top: 0; }
.light-top {
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between;
}
.light-name { font-size: 3.9vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hint { color: #8a8378; font-size: 3.4vw; padding: 2vw 0; }

/* Setup screen */
#setup { max-width: 560px; margin: 0 auto; }
#setup h1 { font-size: 7vw; margin-bottom: 3vw; }
#setup p { color: #b3aca1; font-size: 4vw; line-height: 1.5; margin-bottom: 4vw; }
#setup .btn {
  display: inline-block; border: 0; background: #f4b73d; color: #241500; font-weight: 700;
  padding: 3.4vw 6vw; border-radius: 999px; font-size: 4.4vw; cursor: pointer; margin: 2vw 2vw 2vw 0;
}
#setup .btn.ghost { background: rgba(255,255,255,.12); color: #f2efe9; }
#setup input {
  width: 100%; padding: 3.4vw; font-size: 4.4vw; border-radius: 12px; border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06); color: #f2efe9; margin: 2vw 0;
}
#status { margin-top: 3vw; font-size: 4vw; color: #b3aca1; min-height: 1.4em; }
#status.err { color: #ff9a8a; }

@media (min-width: 640px) {
  .head h1 { font-size: 30px; } .allbtns button { font-size: 16px; padding: 12px 20px; }
  .card { padding: 20px; }
  .card .name { font-size: 20px; } .toggle { width: 62px; height: 36px; }
  .toggle:after { width: 30px; height: 30px; top: 3px; left: 3px; }
  .card.on .toggle:after, .toggle.on:after { left: 29px; }
  .card input[type=range] { height: 26px; }
  .card input[type=range]::-webkit-slider-runnable-track { height: 8px; }
  .card input[type=range]::-webkit-slider-thumb { width: 26px; height: 26px; margin-top: -9px; }
  #setup h1 { font-size: 34px; } #setup p, #setup .btn, #setup input, #status { font-size: 18px; }
  #setup .btn { padding: 14px 26px; }
  .card .sub { font-size: 13px; }
  .expand { font-size: 15px; padding: 12px; } .sectlabel { font-size: 11px; }
  .swatch { width: 38px; height: 38px; margin: 6px; } .swatch.sel:after { line-height: 38px; font-size: 19px; }
  .scene-tile { height: 96px; } .scene-tile .nm { font-size: 14px; padding: 10px; }
  .scene-tile .chk { width: 26px; height: 26px; line-height: 26px; font-size: 15px; }
  .more-btn { font-size: 15px; padding: 12px 16px; } .more-btn .chev { font-size: 22px; }
  .sheet-title { font-size: 24px; } .sheet-close { width: 44px; height: 44px; font-size: 26px; }
  .sheet-head { padding: 22px 22px 12px; } .sheet-body { padding: 0 22px 24px; }
  .m-slider { height: 28px; } .m-slider::-webkit-slider-runnable-track { height: 8px; }
  .m-slider::-webkit-slider-thumb { width: 28px; height: 28px; margin-top: -10px; }
  .sheet .swatch { width: 46px; height: 46px; } .sheet .swatch.sel:after { line-height: 46px; font-size: 23px; }
  .light-name { font-size: 16px; } .light-row { padding: 14px 0; } .hint { font-size: 14px; }
}

/* Responsive columns: 2 → 3 → 4 → 5 rooms across as width grows */
@media (min-width: 620px)  { .card { width: 29.3%; } }
@media (min-width: 1000px) { .card { width: 21%; } }
@media (min-width: 1340px) { .card { width: 16%; } }

/* Responsive scene tiles inside the popup: 2 → 4 → 5 across */
@media (min-width: 680px)  { .sheet .scene-tile { width: 22%; height: 104px; } }
@media (min-width: 1200px) { .sheet .scene-tile { width: 17%; height: 116px; } }
</style>
</head>
<body>

<div id="setup" class="screen" style="display:none">
  <h1>Connect your Hue Bridge</h1>
  <p>Step 1 &mdash; find your Bridge on the network.</p>
  <button class="btn ghost" id="findBtn">Find Bridge</button>
  <input id="ipInput" type="text" placeholder="or type the Bridge IP, e.g. 192.168.1.20" />
  <p>Step 2 &mdash; press the round button on top of the Bridge, then tap Connect.</p>
  <button class="btn" id="pairBtn">Connect</button>
  <div id="status"></div>
</div>

<div id="panel" class="screen" style="display:none">
  <div class="head">
    <h1>Lights</h1>
    <div class="allbtns">
      <button id="allOff">All Off</button>
      <button id="allOn" class="on">All On</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div id="modal" class="modal" style="display:none">
  <div class="modal-bg" id="modalBg"></div>
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title" id="mTitle"></div>
      <button class="sheet-close" id="mClose" aria-label="Close">&times;</button>
    </div>
    <div class="sheet-body" id="mBody"></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  function el(id) { return document.getElementById(id); }
  function show(id, on) { el(id).style.display = on ? "block" : "none"; }

  function req(method, url, body, cb) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, url, true);
    if (body) xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) return;
      var data = null;
      try { data = JSON.parse(xhr.responseText); } catch (e) {}
      cb(data, xhr.status);
    };
    xhr.send(body ? JSON.stringify(body) : null);
  }

  /* ── Setup ── */
  function initSetup() {
    show("setup", true); show("panel", false);
    el("findBtn").onclick = function () {
      setStatus("Searching for your Bridge…", false);
      req("POST", "/api/discover", null, function (d) {
        if (d && d.bridge_ip) { el("ipInput").value = d.bridge_ip; setStatus("Found Bridge at " + d.bridge_ip + ". Now press its button and tap Connect.", false); }
        else setStatus("Couldn't find a Bridge automatically. Enter its IP address manually.", true);
      });
    };
    el("pairBtn").onclick = function () {
      var ip = el("ipInput").value.replace(/\s/g, "");
      var go = function () {
        setStatus("Connecting…", false);
        req("POST", "/api/pair", null, function (d) {
          if (d && d.paired) { start(); }
          else if (d && d.error === "press_button") setStatus("Press the round button on top of the Bridge, then tap Connect again.", true);
          else if (d && d.error === "no_bridge") setStatus("Find your Bridge or enter its IP first.", true);
          else setStatus("Couldn't connect. Check the IP and try again.", true);
        });
      };
      if (ip) req("POST", "/api/set-ip", { ip: ip }, go); else go();
    };
  }
  function setStatus(m, isErr) { var s = el("status"); s.textContent = m; s.className = isErr ? "err" : ""; }

  /* ── Panel ── */
  var interacting = 0;
  var expandedId = null;
  var scenesByGroup = {};
  var lightCaps = {};          // lightId -> { color: bool, ct: bool }

  // Colour swatches (need a colour-capable bulb)
  var HUES = [
    { name: "Red",    css: "#ff3b30", act: { on: true, hue: 0,     sat: 254 } },
    { name: "Orange", css: "#ff9500", act: { on: true, hue: 5000,  sat: 254 } },
    { name: "Yellow", css: "#ffcc00", act: { on: true, hue: 11000, sat: 254 } },
    { name: "Green",  css: "#34c759", act: { on: true, hue: 25500, sat: 254 } },
    { name: "Cyan",   css: "#32ade6", act: { on: true, hue: 39000, sat: 254 } },
    { name: "Blue",   css: "#0a84ff", act: { on: true, hue: 46920, sat: 254 } },
    { name: "Purple", css: "#bf5af2", act: { on: true, hue: 50000, sat: 254 } },
    { name: "Pink",   css: "#ff2d92", act: { on: true, hue: 56100, sat: 254 } }
  ];
  // White temperature swatches (need a colour or ambiance bulb)
  var WHITES = [
    { name: "Warm", css: "#ffd9a0", act: { on: true, ct: 454 } },
    { name: "Cool", css: "#dbeeff", act: { on: true, ct: 200 } }
  ];

  var selection = {};       // groupId -> { type:'colour'|'scene', key }
  var scenePalettes = {};   // sceneId -> gradient css string

  // ── Colour maths: Hue light state → RGB ──
  function clamp255(v) { return Math.max(0, Math.min(255, Math.round(v))); }
  function xyToRgb(x, y) {
    if (!y) return [255, 255, 255];
    var Y = 1, X = (Y / y) * x, Z = (Y / y) * (1 - x - y);
    var r =  X * 1.656492 - Y * 0.354851 - Z * 0.255038;
    var g = -X * 0.707196 + Y * 1.655397 + Z * 0.036152;
    var b =  X * 0.051713 - Y * 0.121364 + Z * 1.011530;
    function gam(v) { return v <= 0.0031308 ? 12.92 * v : 1.055 * Math.pow(v, 1 / 2.4) - 0.055; }
    r = gam(r); g = gam(g); b = gam(b);
    var m = Math.max(r, g, b); if (m > 1) { r /= m; g /= m; b /= m; }
    return [clamp255(r * 255), clamp255(g * 255), clamp255(b * 255)];
  }
  function ctToRgb(mired) {
    var t = (1000000 / mired) / 100, r, g, b;
    if (t <= 66) { r = 255; g = 99.4708025861 * Math.log(t) - 161.1195681661; }
    else { r = 329.698727446 * Math.pow(t - 60, -0.1332047592); g = 288.1221695283 * Math.pow(t - 60, -0.0755148492); }
    if (t >= 66) b = 255; else if (t <= 19) b = 0; else b = 138.5177312231 * Math.log(t - 10) - 305.0447927307;
    return [clamp255(r), clamp255(g), clamp255(b)];
  }
  function hsvToRgb(h, s, v) {
    var i = Math.floor(h * 6), f = h * 6 - i, p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s), r, g, b;
    switch (i % 6) {
      case 0: r = v; g = t; b = p; break; case 1: r = q; g = v; b = p; break;
      case 2: r = p; g = v; b = t; break; case 3: r = p; g = q; b = v; break;
      case 4: r = t; g = p; b = v; break; default: r = v; g = p; b = q;
    }
    return [clamp255(r * 255), clamp255(g * 255), clamp255(b * 255)];
  }
  function stateToRgb(s) {
    if (!s) return null;
    if (s.xy) return xyToRgb(s.xy[0], s.xy[1]);
    if (s.ct) return ctToRgb(s.ct);
    if (s.hue !== undefined && s.sat !== undefined) return hsvToRgb(s.hue / 65535, s.sat / 254, 1);
    return null;
  }
  function rgb(a) { return "rgb(" + a[0] + "," + a[1] + "," + a[2] + ")"; }
  function rgba(a, al) { return "rgba(" + a[0] + "," + a[1] + "," + a[2] + "," + al + ")"; }
  function gradientFrom(cols) {
    if (!cols || !cols.length) return "-webkit-linear-gradient(135deg,#e8c9a0,#b1824a)";
    var out = []; for (var i = 0; i < cols.length && i < 4; i++) out.push(rgb(cols[i]));
    if (out.length === 1) out.push(out[0]);
    return "-webkit-linear-gradient(135deg," + out.join(",") + ")";
  }

  function initPanel() {
    show("setup", false); show("panel", true);
    el("allOn").onclick = function () { setGroup(0, { on: true }); };
    el("allOff").onclick = function () { setGroup(0, { on: false }); };
    // Learn each light's capabilities, then scenes, then load the rooms.
    req("GET", "/hue/lights", null, function (lights) {
      lightCaps = {};
      if (lights && !lights.error) {
        for (var lid in lights) {
          if (!lights.hasOwnProperty(lid)) continue;
          var st = lights[lid].state || {};
          lightCaps[lid] = {
            color: (st.hue !== undefined || st.xy !== undefined),
            ct: (st.ct !== undefined)
          };
        }
      }
      req("GET", "/hue/scenes", null, function (scenes) {
        scenesByGroup = {};
        if (scenes && !scenes.error) {
          for (var sid in scenes) {
            if (!scenes.hasOwnProperty(sid)) continue;
            var gid = scenes[sid].group;
            if (!gid) continue;
            if (!scenesByGroup[gid]) scenesByGroup[gid] = [];
            scenesByGroup[gid].push({ id: sid, name: scenes[sid].name });
          }
        }
        loadGroups();
      });
    });
    window.setInterval(function () { if (!interacting) loadGroups(); }, 12000);
  }

  function loadGroups() {
    req("GET", "/hue/groups", null, function (groups) {
      if (!groups || groups.error) { initSetup(); return; }
      var grid = el("grid"); grid.innerHTML = "";
      for (var id in groups) {
        if (!groups.hasOwnProperty(id)) continue;
        var g = groups[id];
        if (!g.lights || !g.lights.length) continue;   // skip empty groups
        grid.appendChild(makeCard(id, g));
      }
    });
  }

  // Fill a scene tile's background with a gradient of the scene's own colours.
  function applyPalette(tile, sid) {
    if (scenePalettes[sid]) { tile.style.background = scenePalettes[sid]; return; }
    req("GET", "/hue/scenes/" + sid, null, function (d) {
      var cols = [];
      if (d && d.lightstates) {
        for (var lid in d.lightstates) {
          if (!d.lightstates.hasOwnProperty(lid)) continue;
          var s = d.lightstates[lid];
          if (s.on === false) continue;
          var c = stateToRgb(s); if (c) cols.push(c);
        }
      }
      var grad = gradientFrom(cols);
      scenePalettes[sid] = grad;
      tile.style.background = grad;
    });
  }

  function makeCard(id, g) {
    var on = !!(g.state && g.state.any_on);
    var bri = (g.action && typeof g.action.bri === "number") ? g.action.bri : 128;
    var lights = g.lights || [];

    var card = document.createElement("div");
    card.className = "card " + (on ? "on" : "off"); card.style.cursor = "pointer";
    if (on) {                                   // tint the card to the room's colour
      var rc = stateToRgb(g.action);
      if (rc) card.style.background = "-webkit-linear-gradient(160deg," + rgba(rc, .34) + ",#17151c 75%)";
    }

    var row = document.createElement("div"); row.className = "row";
    var titles = document.createElement("div"); titles.className = "titles";
    var name = document.createElement("div"); name.className = "name"; name.textContent = g.name;
    var sub = document.createElement("div"); sub.className = "sub";
    sub.textContent = lights.length + (lights.length === 1 ? " light" : " lights");
    titles.appendChild(name); titles.appendChild(sub);
    var tog = document.createElement("div"); tog.className = "toggle" + (on ? " on" : "");
    row.appendChild(titles); row.appendChild(tog);

    var slider = document.createElement("input");
    slider.type = "range"; slider.min = 1; slider.max = 254; slider.value = bri;

    tog.onclick = function (e) {
      if (e) e.stopPropagation();
      on = !on; setGroup(id, { on: on });
      card.style.background = ""; card.className = "card " + (on ? "on" : "off");
      tog.className = "toggle" + (on ? " on" : "");
    };
    slider.onclick = function (e) { if (e) e.stopPropagation(); };
    slider.onchange = function () { setGroup(id, { on: true, bri: parseInt(slider.value, 10) }); on = true; };
    slider.ontouchstart = function (e) { if (e) e.stopPropagation(); interacting++; };
    slider.ontouchend = function () { interacting = Math.max(0, interacting - 1); };

    card.appendChild(row); card.appendChild(slider);

    var hasColor = false, hasCt = false;
    for (var k = 0; k < lights.length; k++) {
      var cap = lightCaps[lights[k]];
      if (cap) { if (cap.color) hasColor = true; if (cap.ct) hasCt = true; }
    }
    // The whole card opens the room popup.
    card.onclick = (function (gid, gg, hc, hct) {
      return function () { openModal(gid, gg, hc, hct); };
    })(id, g, hasColor, hasCt);

    return card;
  }

  // ── helpers ──
  function sectlabel(t) { var d = document.createElement("div"); d.className = "sectlabel"; d.textContent = t; return d; }

  // Map a Hue scene name to one of our local Unsplash images.
  function sceneImage(nm) {
    var n = (nm || "").toLowerCase();
    var map = [
      ["concentr","concentrate"],["focus","concentrate"],["office","concentrate"],["meeting","concentrate"],["study","concentrate"],["work","concentrate"],
      ["relax","relax"],["chill","relax"],["cozy","relax"],["calm","relax"],["unwind","relax"],["candle","relax"],["roman","relax"],["rest","relax"],
      ["read","read"],["book","read"],
      ["energ","energize"],["active","energize"],["awake","energize"],["vibrant","energize"],
      ["bright","bright"],["daylight","bright"],
      ["dimmed","dimmed"],["movie","dimmed"],["cinema","dimmed"],["lounge","dimmed"],["evening","dimmed"],["dim","dimmed"],
      ["nightlight","nightlight"],["sleep","nightlight"],["bedtime","nightlight"],["moonlight","nightlight"],["night","nightlight"],
      ["savanna","savanna"],
      ["tropical","tropical"],["palm","tropical"],["cancun","tropical"],["miami","tropical"],["paradise","tropical"],["coral","tropical"],["lagoon","tropical"],
      ["beach","beach"],["seaside","beach"],["shore","beach"],
      ["arctic","arctic"],["aurora","arctic"],["glacier","arctic"],["nordic","arctic"],
      ["spring","spring"],["blossom","spring"],["bloom","spring"],["floral","spring"],["cherry","spring"],["crocus","spring"],
      ["sunrise","sunrise"],["dawn","sunrise"],["morning","sunrise"],
      ["sunset","sunset"],["dusk","sunset"],["golden","sunset"],["amber","sunset"],["honey","sunset"],["twilight","sunset"],
      ["motown","motown"],["soul","motown"],
      ["party","party"],["disco","party"],["festive","party"],["neon","party"],["vapor","party"],["retro","party"],["carnival","party"],
      ["ocean","ocean"],["marine","ocean"],["wave","ocean"],["aqua","ocean"],["underwater","ocean"],["sea","ocean"],
      ["forest","forest"],["woods","forest"],["jungle","forest"],["emerald","forest"],["jade","forest"],["pine","forest"],
      ["fire","fireplace"],["hearth","fireplace"],["ember","fireplace"],["flame","fireplace"],
      ["galaxy","galaxy"],["space","galaxy"],["nebula","galaxy"],["cosmic","galaxy"],["starr","galaxy"],["moon","galaxy"],["lunar","galaxy"],["universe","galaxy"],
      ["autumn","autumn"],["fall","autumn"],["harvest","autumn"],
      ["meadow","meadow"],["garden","meadow"],["field","meadow"],["valley","meadow"],["grass","meadow"],
      ["winter","winter"],["snow","winter"],["frost","winter"],["christmas","winter"],["xmas","winter"],
      ["lavender","lavender"],["purple","lavender"],["lilac","lavender"],["violet","lavender"],["plum","lavender"],
      ["chinatown","chinatown"],["soho","soho"],["tokyo","tokyo"],["osaka","tokyo"],
      ["city","city"],["urban","city"],["skyline","city"],["downtown","city"],
      ["desert","desert"],["dune","desert"],["sahara","desert"],["canyon","desert"],
      ["misty","misty"],["mist","misty"],["fog","misty"],["mountain","misty"]
    ];
    for (var i = 0; i < map.length; i++) if (n.indexOf(map[i][0]) >= 0) return "scenes/" + map[i][1] + ".jpg";
    return null;
  }
  function fillTile(tile, s) {
    var img = sceneImage(s.name);
    if (img) {
      tile.style.background = "#26262c";
      var im = new Image();
      im.onload = function () { tile.style.backgroundImage = "url('" + img + "')"; tile.style.backgroundSize = "cover"; tile.style.backgroundPosition = "center"; };
      im.onerror = function () { applyPalette(tile, s.id); };
      im.src = img;
    } else { applyPalette(tile, s.id); }
  }

  // Nearest preset to the room's current colour, for auto-highlight.
  function nearestColourKey(action, hasColor, hasCt) {
    if (!action) return null;
    if (action.colormode === "ct" || (action.ct !== undefined && action.hue === undefined)) {
      return hasCt ? (action.ct >= 350 ? "Warm" : "Cool") : null;
    }
    if (action.hue !== undefined && hasColor) {
      var hdeg = action.hue / 65535 * 360, best = null, bd = 1e9;
      for (var i = 0; i < HUES.length; i++) {
        var deg = HUES[i].act.hue / 65535 * 360, d = Math.abs(deg - hdeg); if (d > 180) d = 360 - d;
        if (d < bd) { bd = d; best = HUES[i].name; }
      }
      return best;
    }
    return null;
  }

  // HSV colour wheel with a draggable marker.
  function buildWheel(id, action, clearSel) {
    var SIZE = 220, r = SIZE / 2;
    var wrap = document.createElement("div"); wrap.className = "wheel-wrap";
    var cv = document.createElement("canvas"); cv.width = SIZE; cv.height = SIZE; cv.className = "wheel";
    var ctx = cv.getContext("2d");
    for (var a = 0; a < 360; a++) {
      ctx.beginPath(); ctx.moveTo(r, r);
      ctx.arc(r, r, r, (a - 0.7) * Math.PI / 180, (a + 0.7) * Math.PI / 180); ctx.closePath();
      ctx.fillStyle = "hsl(" + a + ",100%,50%)"; ctx.fill();
    }
    var grd = ctx.createRadialGradient(r, r, 0, r, r, r);
    grd.addColorStop(0, "rgba(255,255,255,1)"); grd.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(r, r, r, 0, 2 * Math.PI); ctx.fill();

    var marker = document.createElement("div"); marker.className = "wheel-marker";
    wrap.appendChild(cv); wrap.appendChild(marker);
    function place(x, y) { marker.style.left = (x - 10) + "px"; marker.style.top = (y - 10) + "px"; }
    if (action && action.hue !== undefined) {
      var hd = action.hue / 65535 * 360, s0 = (action.sat || 0) / 254, rad0 = hd * Math.PI / 180;
      place(r + Math.cos(rad0) * s0 * (r - 2), r + Math.sin(rad0) * s0 * (r - 2));
    } else { place(r, r); }

    function pick(cx, cy, commit) {
      var rect = cv.getBoundingClientRect(), scale = SIZE / rect.width;
      var x = (cx - rect.left) * scale, y = (cy - rect.top) * scale, dx = x - r, dy = y - r;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > r) { x = r + dx / dist * r; y = r + dy / dist * r; dist = r; }
      place(x, y);
      var ang = Math.atan2(dy, dx) * 180 / Math.PI; if (ang < 0) ang += 360;
      if (commit) {
        setGroup(id, { on: true, hue: Math.round(ang / 360 * 65535), sat: Math.round(Math.min(1, dist / r) * 254) });
        selection[id] = { type: "colour", key: null }; clearSel("swatch"); clearSel("scene-tile");
      }
    }
    var drag = false;
    cv.ontouchstart = function (e) { drag = true; var t = e.touches[0]; pick(t.clientX, t.clientY, false); if (e.preventDefault) e.preventDefault(); };
    cv.ontouchmove = function (e) { if (!drag) return; var t = e.touches[0]; pick(t.clientX, t.clientY, false); if (e.preventDefault) e.preventDefault(); };
    cv.ontouchend = function (e) { drag = false; var t = e.changedTouches && e.changedTouches[0]; if (t) pick(t.clientX, t.clientY, true); };
    cv.onmousedown = function (e) { drag = true; pick(e.clientX, e.clientY, false); };
    cv.onmousemove = function (e) { if (drag) pick(e.clientX, e.clientY, false); };
    cv.onmouseup = function (e) { if (drag) { drag = false; pick(e.clientX, e.clientY, true); } };
    return wrap;
  }

  function setLight(lid, state) { req("PUT", "/hue/lights/" + lid + "/state", state, function () {}); }
  function lightRow(lid, L) {
    var st = L.state || {}, on = !!st.on;
    var row = document.createElement("div"); row.className = "light-row";
    var top = document.createElement("div"); top.className = "light-top";
    var nm = document.createElement("div"); nm.className = "light-name"; nm.textContent = L.name || ("Light " + lid);
    var tg = document.createElement("div"); tg.className = "toggle" + (on ? " on" : "");
    top.appendChild(nm); top.appendChild(tg); row.appendChild(top);
    var sl = document.createElement("input"); sl.type = "range"; sl.min = 1; sl.max = 254; sl.className = "m-slider";
    sl.value = (typeof st.bri === "number") ? st.bri : 128;
    tg.onclick = function () { on = !on; setLight(lid, { on: on }); tg.className = "toggle" + (on ? " on" : ""); };
    sl.onchange = function () { setLight(lid, { on: true, bri: parseInt(sl.value, 10) }); on = true; tg.className = "toggle on"; };
    row.appendChild(sl);
    if (st.reachable === false) { nm.textContent += " (unreachable)"; row.style.opacity = ".5"; }
    return row;
  }

  // ── Room detail popup ──
  function openModal(id, g, hasColor, hasCt) {
    var body = el("mBody"), scs = scenesByGroup[id] || [], action = g.action || {};
    el("mTitle").textContent = g.name;
    body.innerHTML = "";
    function clearSel(cls) {
      var nodes = body.querySelectorAll("." + cls);
      for (var n = 0; n < nodes.length; n++) nodes[n].className = nodes[n].className.replace(" sel", "");
    }

    // Brightness
    body.appendChild(sectlabel("Brightness"));
    var bslider = document.createElement("input");
    bslider.type = "range"; bslider.min = 1; bslider.max = 254; bslider.className = "m-slider";
    bslider.value = (typeof action.bri === "number") ? action.bri : 128;
    bslider.onchange = function () { setGroup(id, { on: true, bri: parseInt(bslider.value, 10) }); };
    body.appendChild(bslider);

    // Scenes (with images)
    if (scs.length) {
      body.appendChild(sectlabel("Scenes"));
      var sd = document.createElement("div"); sd.className = "scenes";
      for (var j = 0; j < scs.length; j++) {
        (function (s) {
          var sel = selection[id] && selection[id].type === "scene" && selection[id].key === s.id;
          var tile = document.createElement("div"); tile.className = "scene-tile" + (sel ? " sel" : "");
          var nm = document.createElement("div"); nm.className = "nm"; nm.textContent = s.name;
          var chk = document.createElement("div"); chk.className = "chk"; chk.innerHTML = "&#10003;";
          tile.appendChild(nm); tile.appendChild(chk);
          fillTile(tile, s);
          tile.onclick = function () {
            setGroup(id, { scene: s.id }); selection[id] = { type: "scene", key: s.id };
            clearSel("scene-tile"); clearSel("swatch"); tile.className = "scene-tile sel";
          };
          sd.appendChild(tile);
        })(scs[j]);
      }
      body.appendChild(sd);
    }

    // Colour: wheel + presets (auto-highlighting the current colour)
    if (hasColor || hasCt) {
      body.appendChild(sectlabel("Colour"));
      if (hasColor) body.appendChild(buildWheel(id, action, clearSel));
      var sw = document.createElement("div"); sw.className = "swatches";
      var pool = [];
      if (hasColor) pool = pool.concat(HUES);
      if (hasCt) pool = pool.concat(WHITES);
      var autoKey = (selection[id] && selection[id].type === "colour") ? selection[id].key : nearestColourKey(action, hasColor, hasCt);
      for (var i = 0; i < pool.length; i++) {
        (function (c) {
          var b = document.createElement("div"); b.className = "swatch" + (c.name === autoKey ? " sel" : "");
          b.style.background = c.css; b.title = c.name;
          b.onclick = function () {
            setGroup(id, c.act); selection[id] = { type: "colour", key: c.name };
            clearSel("swatch"); clearSel("scene-tile"); b.className = "swatch sel";
          };
          sw.appendChild(b);
        })(pool[i]);
      }
      body.appendChild(sw);
    }

    // Individual lights
    body.appendChild(sectlabel("Lights"));
    var lwrap = document.createElement("div"); lwrap.className = "lights";
    lwrap.innerHTML = "<div class='hint'>Loading…</div>";
    body.appendChild(lwrap);
    req("GET", "/hue/lights", null, function (lights) {
      lwrap.innerHTML = "";
      var ids = g.lights || [];
      for (var i = 0; i < ids.length; i++) {
        var L = lights && lights[ids[i]];
        if (L) lwrap.appendChild(lightRow(ids[i], L));
      }
      if (!lwrap.childNodes.length) lwrap.innerHTML = "<div class='hint'>No individual lights found.</div>";
    });

    el("modal").style.display = "-webkit-flex";
    el("modal").style.display = "flex";
    body.scrollTop = 0;
  }
  function closeModal() { el("modal").style.display = "none"; }

  function setGroup(id, action) {
    req("PUT", "/hue/groups/" + id + "/action", action, function () {});
  }

  /* ── Boot ── */
  el("mClose").onclick = closeModal;
  el("modalBg").onclick = closeModal;

  function start() {
    req("GET", "/api/state", null, function (d) {
      if (d && d.paired) initPanel(); else initSetup();
    });
  }
  start();
})();
</script>
</body>
