<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lights</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; background: #0c0b0f; color: #f2efe9;
  font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  -webkit-user-select: none; user-select: none;
}
body { background: -webkit-radial-gradient(50% 0%, 120% 90%, #201d27, #0b0a0e 70%); }
.screen { padding: 4vw; }

/* Header */
.head {
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between; margin-bottom: 3vw;
}
.head h1 { font-size: 6vw; font-weight: 700; letter-spacing: .5px; }
.allbtns { display: -webkit-flex; display: flex; }
.allbtns button {
  border: 0; border-radius: 999px; padding: 2.4vw 4vw; margin-left: 2vw;
  font-size: 3.6vw; font-weight: 600; cursor: pointer; color: #f2efe9;
  background: rgba(255,255,255,.1);
}
.allbtns button:active { -webkit-transform: scale(.95); transform: scale(.95); }
.allbtns .on { background: #f4b73d; color: #241500; }

/* Room cards */
.grid {
  display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap;
  -webkit-align-items: flex-start; align-items: flex-start;   /* don't stretch cards to row height */
}
.card {
  width: 46%; margin: 2%; padding: 4vw; border-radius: 18px;
  background: -webkit-linear-gradient(top, #232029, #17151c);
  box-shadow: 0 8px 22px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
}
.card.on { background: -webkit-linear-gradient(top, #4a3a12, #2a2109); }
.card .row {
  display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between;
}
.card .titles { min-width: 0; }
.card .name { font-size: 4.4vw; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card .sub { font-size: 3vw; color: #a49d92; margin-top: .4vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toggle {
  width: 15vw; height: 8.6vw; border-radius: 999px; background: rgba(255,255,255,.16);
  position: relative; -webkit-transition: background .15s; transition: background .15s; flex: 0 0 auto;
}
.toggle:after {
  content: ""; position: absolute; top: .8vw; left: .8vw; width: 7vw; height: 7vw;
  border-radius: 50%; background: #fff;
  -webkit-transition: left .15s; transition: left .15s;
}
.card.on .toggle { background: #f4b73d; }
.card.on .toggle:after { left: 7.8vw; }
.card input[type=range] {
  width: 100%; margin-top: 4vw; -webkit-appearance: none; height: 6vw;
  background: transparent;
}
.card input[type=range]::-webkit-slider-runnable-track {
  height: 2.4vw; border-radius: 999px; background: rgba(255,255,255,.18);
}
.card input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 7vw; height: 7vw; border-radius: 50%;
  background: #fff; margin-top: -2.3vw; box-shadow: 0 2px 5px rgba(0,0,0,.4);
}
.card.off input[type=range]::-webkit-slider-thumb { background: #8a857c; }

/* Colours & scenes */
.expand {
  margin-top: 3.5vw; width: 100%; background: rgba(255,255,255,.08); color: #d8d2c8;
  border: 0; border-radius: 999px; padding: 2.8vw; font-size: 3.4vw; font-weight: 600; cursor: pointer;
}
.more { display: none; margin-top: 3.5vw; }
.more.open { display: block; }
.sectlabel { font-size: 2.8vw; color: #8a8378; text-align: left; margin: 2vw 0 1.6vw;
  letter-spacing: 1px; text-transform: uppercase; }
.swatches { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
.swatch {
  position: relative; width: 10vw; height: 10vw; border-radius: 50%; margin: 1.4vw;
  border: 2px solid rgba(255,255,255,.22); cursor: pointer;
}
.swatch:active { -webkit-transform: scale(.9); transform: scale(.9); }
.swatch.sel { border-color: #fff; box-shadow: 0 0 0 3px #fff; }
.swatch.sel:after {
  content: "\2713"; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  line-height: 10vw; text-align: center; color: #fff; font-size: 4.6vw; font-weight: 700;
  text-shadow: 0 1px 2px rgba(0,0,0,.7);
}
.scenes { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
.scene-tile {
  position: relative; width: 46%; margin: 2%; height: 22vw; border-radius: 14px; overflow: hidden;
  background: #2a2a30; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.4);
}
.scene-tile .nm {
  position: absolute; left: 0; right: 0; bottom: 0; padding: 2.6vw; font-size: 3.3vw; font-weight: 600;
  color: #fff; text-align: left; text-shadow: 0 1px 3px rgba(0,0,0,.9);
  background: -webkit-linear-gradient(top, rgba(0,0,0,0), rgba(0,0,0,.6));
}
.scene-tile.sel { box-shadow: 0 0 0 3px #fff, 0 3px 10px rgba(0,0,0,.4); }
.scene-tile .chk {
  position: absolute; top: 1.8vw; right: 1.8vw; width: 6.4vw; height: 6.4vw; border-radius: 50%;
  background: #fff; color: #111; text-align: center; line-height: 6.4vw; font-size: 3.8vw; font-weight: 700;
  display: none;
}
.scene-tile.sel .chk { display: block; }

/* Setup screen */
#setup { max-width: 560px; margin: 0 auto; }
#setup h1 { font-size: 7vw; margin-bottom: 3vw; }
#setup p { color: #b3aca1; font-size: 4vw; line-height: 1.5; margin-bottom: 4vw; }
#setup .btn {
  display: inline-block; border: 0; background: #f4b73d; color: #241500; font-weight: 700;
  padding: 3.4vw 6vw; border-radius: 999px; font-size: 4.4vw; cursor: pointer; margin: 2vw 2vw 2vw 0;
}
#setup .btn.ghost { background: rgba(255,255,255,.12); color: #f2efe9; }
#setup input {
  width: 100%; padding: 3.4vw; font-size: 4.4vw; border-radius: 12px; border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06); color: #f2efe9; margin: 2vw 0;
}
#status { margin-top: 3vw; font-size: 4vw; color: #b3aca1; min-height: 1.4em; }
#status.err { color: #ff9a8a; }

@media (min-width: 640px) {
  .head h1 { font-size: 30px; } .allbtns button { font-size: 16px; padding: 12px 20px; }
  .card { padding: 20px; }
  .card .name { font-size: 20px; } .toggle { width: 62px; height: 36px; }
  .toggle:after { width: 30px; height: 30px; top: 3px; left: 3px; }
  .card.on .toggle:after { left: 29px; }
  .card input[type=range] { height: 26px; }
  .card input[type=range]::-webkit-slider-runnable-track { height: 8px; }
  .card input[type=range]::-webkit-slider-thumb { width: 26px; height: 26px; margin-top: -9px; }
  #setup h1 { font-size: 34px; } #setup p, #setup .btn, #setup input, #status { font-size: 18px; }
  #setup .btn { padding: 14px 26px; }
  .card .sub { font-size: 13px; }
  .expand { font-size: 15px; padding: 12px; } .sectlabel { font-size: 11px; }
  .swatch { width: 38px; height: 38px; margin: 6px; } .swatch.sel:after { line-height: 38px; font-size: 19px; }
  .scene-tile { height: 96px; } .scene-tile .nm { font-size: 14px; padding: 10px; }
  .scene-tile .chk { width: 26px; height: 26px; line-height: 26px; font-size: 15px; }
}

/* Responsive columns: 2 → 3 → 4 → 5 rooms across as width grows */
@media (min-width: 620px)  { .card { width: 29.3%; } }
@media (min-width: 1000px) { .card { width: 21%; } }
@media (min-width: 1340px) { .card { width: 16%; } }
</style>
</head>
<body>

<div id="setup" class="screen" style="display:none">
  <h1>Connect your Hue Bridge</h1>
  <p>Step 1 &mdash; find your Bridge on the network.</p>
  <button class="btn ghost" id="findBtn">Find Bridge</button>
  <input id="ipInput" type="text" placeholder="or type the Bridge IP, e.g. 192.168.1.20" />
  <p>Step 2 &mdash; press the round button on top of the Bridge, then tap Connect.</p>
  <button class="btn" id="pairBtn">Connect</button>
  <div id="status"></div>
</div>

<div id="panel" class="screen" style="display:none">
  <div class="head">
    <h1>Lights</h1>
    <div class="allbtns">
      <button id="allOff">All Off</button>
      <button id="allOn" class="on">All On</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
(function () {
  "use strict";
  function el(id) { return document.getElementById(id); }
  function show(id, on) { el(id).style.display = on ? "block" : "none"; }

  function req(method, url, body, cb) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, url, true);
    if (body) xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) return;
      var data = null;
      try { data = JSON.parse(xhr.responseText); } catch (e) {}
      cb(data, xhr.status);
    };
    xhr.send(body ? JSON.stringify(body) : null);
  }

  /* ── Setup ── */
  function initSetup() {
    show("setup", true); show("panel", false);
    el("findBtn").onclick = function () {
      setStatus("Searching for your Bridge…", false);
      req("POST", "/api/discover", null, function (d) {
        if (d && d.bridge_ip) { el("ipInput").value = d.bridge_ip; setStatus("Found Bridge at " + d.bridge_ip + ". Now press its button and tap Connect.", false); }
        else setStatus("Couldn't find a Bridge automatically. Enter its IP address manually.", true);
      });
    };
    el("pairBtn").onclick = function () {
      var ip = el("ipInput").value.replace(/\s/g, "");
      var go = function () {
        setStatus("Connecting…", false);
        req("POST", "/api/pair", null, function (d) {
          if (d && d.paired) { start(); }
          else if (d && d.error === "press_button") setStatus("Press the round button on top of the Bridge, then tap Connect again.", true);
          else if (d && d.error === "no_bridge") setStatus("Find your Bridge or enter its IP first.", true);
          else setStatus("Couldn't connect. Check the IP and try again.", true);
        });
      };
      if (ip) req("POST", "/api/set-ip", { ip: ip }, go); else go();
    };
  }
  function setStatus(m, isErr) { var s = el("status"); s.textContent = m; s.className = isErr ? "err" : ""; }

  /* ── Panel ── */
  var interacting = 0;
  var expandedId = null;
  var scenesByGroup = {};
  var lightCaps = {};          // lightId -> { color: bool, ct: bool }

  // Colour swatches (need a colour-capable bulb)
  var HUES = [
    { name: "Red",    css: "#ff3b30", act: { on: true, hue: 0,     sat: 254 } },
    { name: "Orange", css: "#ff9500", act: { on: true, hue: 5000,  sat: 254 } },
    { name: "Yellow", css: "#ffcc00", act: { on: true, hue: 11000, sat: 254 } },
    { name: "Green",  css: "#34c759", act: { on: true, hue: 25500, sat: 254 } },
    { name: "Cyan",   css: "#32ade6", act: { on: true, hue: 39000, sat: 254 } },
    { name: "Blue",   css: "#0a84ff", act: { on: true, hue: 46920, sat: 254 } },
    { name: "Purple", css: "#bf5af2", act: { on: true, hue: 50000, sat: 254 } },
    { name: "Pink",   css: "#ff2d92", act: { on: true, hue: 56100, sat: 254 } }
  ];
  // White temperature swatches (need a colour or ambiance bulb)
  var WHITES = [
    { name: "Warm", css: "#ffd9a0", act: { on: true, ct: 454 } },
    { name: "Cool", css: "#dbeeff", act: { on: true, ct: 200 } }
  ];

  var selection = {};       // groupId -> { type:'colour'|'scene', key }
  var scenePalettes = {};   // sceneId -> gradient css string

  // ── Colour maths: Hue light state → RGB ──
  function clamp255(v) { return Math.max(0, Math.min(255, Math.round(v))); }
  function xyToRgb(x, y) {
    if (!y) return [255, 255, 255];
    var Y = 1, X = (Y / y) * x, Z = (Y / y) * (1 - x - y);
    var r =  X * 1.656492 - Y * 0.354851 - Z * 0.255038;
    var g = -X * 0.707196 + Y * 1.655397 + Z * 0.036152;
    var b =  X * 0.051713 - Y * 0.121364 + Z * 1.011530;
    function gam(v) { return v <= 0.0031308 ? 12.92 * v : 1.055 * Math.pow(v, 1 / 2.4) - 0.055; }
    r = gam(r); g = gam(g); b = gam(b);
    var m = Math.max(r, g, b); if (m > 1) { r /= m; g /= m; b /= m; }
    return [clamp255(r * 255), clamp255(g * 255), clamp255(b * 255)];
  }
  function ctToRgb(mired) {
    var t = (1000000 / mired) / 100, r, g, b;
    if (t <= 66) { r = 255; g = 99.4708025861 * Math.log(t) - 161.1195681661; }
    else { r = 329.698727446 * Math.pow(t - 60, -0.1332047592); g = 288.1221695283 * Math.pow(t - 60, -0.0755148492); }
    if (t >= 66) b = 255; else if (t <= 19) b = 0; else b = 138.5177312231 * Math.log(t - 10) - 305.0447927307;
    return [clamp255(r), clamp255(g), clamp255(b)];
  }
  function hsvToRgb(h, s, v) {
    var i = Math.floor(h * 6), f = h * 6 - i, p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s), r, g, b;
    switch (i % 6) {
      case 0: r = v; g = t; b = p; break; case 1: r = q; g = v; b = p; break;
      case 2: r = p; g = v; b = t; break; case 3: r = p; g = q; b = v; break;
      case 4: r = t; g = p; b = v; break; default: r = v; g = p; b = q;
    }
    return [clamp255(r * 255), clamp255(g * 255), clamp255(b * 255)];
  }
  function stateToRgb(s) {
    if (!s) return null;
    if (s.xy) return xyToRgb(s.xy[0], s.xy[1]);
    if (s.ct) return ctToRgb(s.ct);
    if (s.hue !== undefined && s.sat !== undefined) return hsvToRgb(s.hue / 65535, s.sat / 254, 1);
    return null;
  }
  function rgb(a) { return "rgb(" + a[0] + "," + a[1] + "," + a[2] + ")"; }
  function rgba(a, al) { return "rgba(" + a[0] + "," + a[1] + "," + a[2] + "," + al + ")"; }
  function gradientFrom(cols) {
    if (!cols || !cols.length) return "-webkit-linear-gradient(135deg,#e8c9a0,#b1824a)";
    var out = []; for (var i = 0; i < cols.length && i < 4; i++) out.push(rgb(cols[i]));
    if (out.length === 1) out.push(out[0]);
    return "-webkit-linear-gradient(135deg," + out.join(",") + ")";
  }

  function initPanel() {
    show("setup", false); show("panel", true);
    el("allOn").onclick = function () { setGroup(0, { on: true }); };
    el("allOff").onclick = function () { setGroup(0, { on: false }); };
    // Learn each light's capabilities, then scenes, then load the rooms.
    req("GET", "/hue/lights", null, function (lights) {
      lightCaps = {};
      if (lights && !lights.error) {
        for (var lid in lights) {
          if (!lights.hasOwnProperty(lid)) continue;
          var st = lights[lid].state || {};
          lightCaps[lid] = {
            color: (st.hue !== undefined || st.xy !== undefined),
            ct: (st.ct !== undefined)
          };
        }
      }
      req("GET", "/hue/scenes", null, function (scenes) {
        scenesByGroup = {};
        if (scenes && !scenes.error) {
          for (var sid in scenes) {
            if (!scenes.hasOwnProperty(sid)) continue;
            var gid = scenes[sid].group;
            if (!gid) continue;
            if (!scenesByGroup[gid]) scenesByGroup[gid] = [];
            scenesByGroup[gid].push({ id: sid, name: scenes[sid].name });
          }
        }
        loadGroups();
      });
    });
    window.setInterval(function () { if (!interacting) loadGroups(); }, 12000);
  }

  function loadGroups() {
    req("GET", "/hue/groups", null, function (groups) {
      if (!groups || groups.error) { initSetup(); return; }
      var grid = el("grid"); grid.innerHTML = "";
      for (var id in groups) {
        if (!groups.hasOwnProperty(id)) continue;
        var g = groups[id];
        if (!g.lights || !g.lights.length) continue;   // skip empty groups
        grid.appendChild(makeCard(id, g));
      }
    });
  }

  // Fill a scene tile's background with a gradient of the scene's own colours.
  function applyPalette(tile, sid) {
    if (scenePalettes[sid]) { tile.style.background = scenePalettes[sid]; return; }
    req("GET", "/hue/scenes/" + sid, null, function (d) {
      var cols = [];
      if (d && d.lightstates) {
        for (var lid in d.lightstates) {
          if (!d.lightstates.hasOwnProperty(lid)) continue;
          var s = d.lightstates[lid];
          if (s.on === false) continue;
          var c = stateToRgb(s); if (c) cols.push(c);
        }
      }
      var grad = gradientFrom(cols);
      scenePalettes[sid] = grad;
      tile.style.background = grad;
    });
  }

  function makeCard(id, g) {
    var on = !!(g.state && g.state.any_on);
    var bri = (g.action && typeof g.action.bri === "number") ? g.action.bri : 128;
    var lights = g.lights || [];

    var card = document.createElement("div");
    card.className = "card " + (on ? "on" : "off");
    if (on) {                                   // tint the card to the room's colour
      var rc = stateToRgb(g.action);
      if (rc) card.style.background = "-webkit-linear-gradient(160deg," + rgba(rc, .34) + ",#17151c 75%)";
    }

    var row = document.createElement("div"); row.className = "row";
    var titles = document.createElement("div"); titles.className = "titles";
    var name = document.createElement("div"); name.className = "name"; name.textContent = g.name;
    var sub = document.createElement("div"); sub.className = "sub";
    sub.textContent = lights.length + (lights.length === 1 ? " light" : " lights");
    titles.appendChild(name); titles.appendChild(sub);
    var tog = document.createElement("div"); tog.className = "toggle";
    row.appendChild(titles); row.appendChild(tog);

    var slider = document.createElement("input");
    slider.type = "range"; slider.min = 1; slider.max = 254; slider.value = bri;

    tog.onclick = function () {
      on = !on; setGroup(id, { on: on });
      card.style.background = ""; card.className = "card " + (on ? "on" : "off");
    };
    slider.onchange = function () { setGroup(id, { on: true, bri: parseInt(slider.value, 10) }); on = true; };
    slider.ontouchstart = function () { interacting++; };
    slider.ontouchend = function () { interacting = Math.max(0, interacting - 1); };

    card.appendChild(row); card.appendChild(slider);

    // Capabilities of this room's bulbs
    var hasColor = false, hasCt = false;
    for (var k = 0; k < lights.length; k++) {
      var cap = lightCaps[lights[k]];
      if (cap) { if (cap.color) hasColor = true; if (cap.ct) hasCt = true; }
    }
    var scs = scenesByGroup[id] || [];
    if (!(hasColor || hasCt || scs.length)) return card;

    var labels = [];
    if (hasColor || hasCt) labels.push("Colours");
    if (scs.length) labels.push("Scenes");
    var expand = document.createElement("button");
    expand.className = "expand"; expand.textContent = labels.join(" & ");
    var more = document.createElement("div");
    more.className = "more" + (expandedId === id ? " open" : "");

    function clearSel() {
      var nodes = more.querySelectorAll(".swatch, .scene-tile");
      for (var n = 0; n < nodes.length; n++)
        nodes[n].className = nodes[n].className.replace(" sel", "");
    }

    // Colour swatches
    if (hasColor || hasCt) {
      var lbl = document.createElement("div"); lbl.className = "sectlabel"; lbl.textContent = "Colour";
      more.appendChild(lbl);
      var swWrap = document.createElement("div"); swWrap.className = "swatches";
      var pool = [];
      if (hasColor) pool = pool.concat(HUES);
      if (hasCt) pool = pool.concat(WHITES);
      for (var i = 0; i < pool.length; i++) {
        (function (c) {
          var sel = selection[id] && selection[id].type === "colour" && selection[id].key === c.name;
          var b = document.createElement("div");
          b.className = "swatch" + (sel ? " sel" : "");
          b.style.background = c.css; b.title = c.name;
          b.onclick = function () {
            setGroup(id, c.act); selection[id] = { type: "colour", key: c.name };
            clearSel(); b.className = "swatch sel";
          };
          swWrap.appendChild(b);
        })(pool[i]);
      }
      more.appendChild(swWrap);
    }

    // Scene tiles (gradient = the scene's actual colours)
    var sceneTiles = [], palettesLoaded = false;
    if (scs.length) {
      var lbl2 = document.createElement("div"); lbl2.className = "sectlabel"; lbl2.textContent = "Scenes";
      more.appendChild(lbl2);
      var sd = document.createElement("div"); sd.className = "scenes";
      for (var j = 0; j < scs.length; j++) {
        (function (s) {
          var sel = selection[id] && selection[id].type === "scene" && selection[id].key === s.id;
          var tile = document.createElement("div");
          tile.className = "scene-tile" + (sel ? " sel" : "");
          var nm = document.createElement("div"); nm.className = "nm"; nm.textContent = s.name;
          var chk = document.createElement("div"); chk.className = "chk"; chk.innerHTML = "&#10003;";
          tile.appendChild(nm); tile.appendChild(chk);
          sceneTiles.push({ el: tile, sid: s.id });
          tile.onclick = function () {
            setGroup(id, { scene: s.id }); selection[id] = { type: "scene", key: s.id };
            clearSel(); tile.className = "scene-tile sel";
          };
          sd.appendChild(tile);
        })(scs[j]);
      }
      more.appendChild(sd);
    }

    function loadPalettes() {
      if (palettesLoaded) return; palettesLoaded = true;
      for (var t = 0; t < sceneTiles.length; t++) applyPalette(sceneTiles[t].el, sceneTiles[t].sid);
    }
    if (expandedId === id) loadPalettes();   // room already open across a re-render

    expand.onclick = function () {
      var open = more.className.indexOf("open") >= 0;
      more.className = open ? "more" : "more open";
      expandedId = open ? null : id;
      if (!open) loadPalettes();             // fetch palettes only when opened
    };

    card.appendChild(expand); card.appendChild(more);
    return card;
  }

  function setGroup(id, action) {
    req("PUT", "/hue/groups/" + id + "/action", action, function () {});
  }

  /* ── Boot ── */
  function start() {
    req("GET", "/api/state", null, function (d) {
      if (d && d.paired) initPanel(); else initSetup();
    });
  }
  start();
})();
</script>
</body>
</html>
