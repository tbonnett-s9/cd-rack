name: Update weather

# Fetches weather server-side and commits clock/weather.json, so the iOS 9
# iPad can read it from the same origin (no cross-origin TLS it can't do).

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (GitHub may delay this a little)
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  weather:
    runs-on: ubuntu-latest
    env:
      # ── Edit these to change the clock's weather location ──
      LAT: "52.45936"
      LON: "1.56465"
      PLACE: "Beccles"
      UNITS: "celsius"        # or "fahrenheit"
    steps:
      - uses: actions/checkout@v4

      - name: Fetch weather
        run: |
          URL="https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weather_code,sunrise,sunset&timezone=auto&forecast_days=5&wind_speed_unit=mph&temperature_unit=${UNITS}"
          curl -sf "$URL" | jq --arg place "$PLACE" '. + {place: $place}' > clock/weather.json

      - name: Commit if changed
        run: |
          git config user.name "weather-bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add clock/weather.json
          git diff --cached --quiet || git commit -m "Update weather data"
          git push
