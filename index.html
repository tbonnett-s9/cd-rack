<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#141414" />
<title>CD Rack</title>
<link rel="stylesheet" href="css/styles.css?v=6" />

<div id="app">
  <!-- Login screen -->
  <section id="login" class="screen" hidden>
    <div class="login-card">
      <h1>CD&nbsp;Rack</h1>
      <p>Your Spotify library, on the shelf.</p>
      <button id="loginBtn" class="btn-primary">Connect Spotify</button>
      <p id="loginError" class="error" hidden></p>
    </div>
  </section>

  <!-- Main rack -->
  <section id="main" class="screen" hidden>
    <header id="topbar">
      <div class="topbar-left">
        <div class="segmented" id="rangeTabs">
          <button data-range="recent" class="active">Recent</button>
          <button data-range="short_term">Weeks</button>
          <button data-range="medium_term">Months</button>
          <button data-range="long_term">Years</button>
        </div>
        <span id="artistChip" class="artist-chip" hidden>
          <span class="chip-name"></span>
          <button class="chip-close" aria-label="Back to library">✕</button>
        </span>
      </div>
      <div class="search">
        <input id="searchInput" class="search-input" type="search"
               placeholder="Search artists…" autocomplete="off" autocorrect="off" />
        <div id="searchResults" class="search-results" hidden></div>
      </div>
      <div class="topbar-right">
        <span id="deviceLabel" class="device-label"></span>
        <button id="surpriseBtn" class="btn-ghost" title="Surprise me">🎲</button>
        <button id="refreshBtn" class="btn-ghost" title="Refresh">↻</button>
        <button id="logoutBtn" class="btn-ghost" title="Disconnect">⏻</button>
      </div>
    </header>

    <div id="filterBar" class="filters" hidden>
      <button data-type="all" class="active">All</button>
      <button data-type="album">Albums</button>
      <button data-type="single">Singles</button>
      <button data-type="compilation">Compilations</button>
    </div>

    <div id="rackWrap">
      <div class="shelf"><div id="rackTop" class="rack"></div></div>
      <div class="shelf"><div id="rackBottom" class="rack"></div></div>
      <div id="rackEmpty" class="rack-empty" hidden></div>
    </div>

    <div id="rackLoading" class="rack-loading">Loading your shelf…</div>

    <!-- Now-playing bar -->
    <div id="nowbar" class="nowbar" hidden>
      <input id="npSeek" class="np-seek" type="range" min="0" max="1000" value="0" />
      <div class="np-inner">
        <img id="npArt" class="np-art" alt="" />
        <div class="np-meta">
          <div id="npTitle" class="np-title"></div>
          <div id="npArtist" class="np-artist"></div>
        </div>
        <div class="np-controls">
          <button id="npShuffle" class="np-btn" title="Shuffle">🔀</button>
          <button id="npPrev" class="np-btn" title="Previous">⏮</button>
          <button id="npPlay" class="np-btn np-play" title="Play/Pause">▶</button>
          <button id="npNext" class="np-btn" title="Next">⏭</button>
          <button id="npRepeat" class="np-btn" title="Repeat">🔁</button>
        </div>
        <div class="np-times"><span id="npCur">0:00</span> / <span id="npDur">0:00</span></div>
        <div class="np-right">
          <button id="npDevice" class="np-device" title="Choose device">♪ Device</button>
          <input id="npVol" class="np-vol" type="range" min="0" max="100" value="50" title="Volume" />
          <div id="devicePicker" class="device-picker" hidden></div>
        </div>
      </div>
    </div>
  </section>

</div>

<!-- Idle ambient (now-playing) overlay -->
<div id="ambient" class="ambient" hidden>
  <div id="ambBg" class="amb-bg"></div>
  <div class="amb-content">
    <img id="ambArt" class="amb-art" alt="" />
    <div id="ambTitle" class="amb-title"></div>
    <div id="ambArtist" class="amb-artist"></div>
  </div>
</div>

<script type="module" src="js/app.js?v=6"></script>
